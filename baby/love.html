<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

/* đoạn văn */

p{
font-size:20px;
max-width:600px;
line-height:1.6;
}

/* nút */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#888;
color:white;
}

/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:30px;
border-radius:20px;
display:none;
font-size:22px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<h1>💖 Gửi đến người em Nguyên yêu dấu của anh 💖</h1>

<p>
Cảm ơn em vì đã đến bên anh.
Những ngày bên em luôn là những ngày hạnh phúc nhất của anh.

Hi vọng chúng ta sẽ còn cùng nhau tạo ra
thật nhiều kỉ niệm đẹp nữa.
</p>

<h2>Em có yêu anh nhiều không? ❤️</h2>

<button class="yes" onclick="sayYes()">Yes 💞</button>
<button class="no" id="noBtn">No 😝</button>

<br>

<button onclick="openMemory()">📸 Xem kỉ niệm của chúng ta</button>

<!-- popup -->

<div class="popup" id="popup">
💖 Anh biết mà, anh cũng yêu em nhiều lắm 💖
</div>

<script>

/* bấm yes */

function sayYes(){
document.getElementById("popup").style.display="block"
}

/* nút no chạy */

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{

noBtn.style.position="absolute"

noBtn.style.left=Math.random()*80+"vw"
noBtn.style.top=Math.random()*80+"vh"

})

/* mở trang kỉ niệm */

function openMemory(){
window.location.href="memory.html"
}

</script>

</body>
</html>
